builds:
  include:
    # NixOS system configurations
    - nixosConfigurations.*
    # Custom packages
    - packages.x86_64-linux.*
    # Namaka snapshot tests
    - checks.x86_64-linux.*
  exclude:
    # Development shells are not always buildable as derivations
    - devShells.*
    # Rust builds excluded from CI to reduce memory footprint (available via binary cache)
    - packages.x86_64-linux.lumen
    - packages.x86_64-linux.scooter-hx
    - packages.x86_64-linux.quantumlauncher
    # ISO builds are memory-intensive (system evaluation + squashfs)
    # Build locally when needed: nix build .#installer-iso-{minimal,full}
    - packages.x86_64-linux.installer-iso-minimal
    - packages.x86_64-linux.installer-iso-full
    # Desktop specialisations (niri + gnome) exceed Garnix ~8GB RAM limit during build
    - nixosConfigurations.desktop
